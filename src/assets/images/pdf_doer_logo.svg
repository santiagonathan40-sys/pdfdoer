<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 120" width="100%" height="100%">
  <!-- Speed Lines / Motion Blur on left -->
  <rect x="5" y="70" width="22" height="6" rx="3" fill="#60a5fa" />
  <rect x="12" y="82" width="26" height="6" rx="3" fill="#3b82f6" />
  <rect x="22" y="94" width="20" height="6" rx="3" fill="#1d4ed8" />

  <!-- Main Document Icon -->
  <!-- Base Blue Card with Rounded Corners and Fold -->
  <path d="M45 15 h42 l28 28 v45 c0 8.28 -6.72 15 -15 15 h-55 c-8.28 0 -15 -6.72 -15 -15 v-58 c0 -8.28 6.72 -15 15 -15 z" fill="#1e70eb" />
  <!-- Folded Corner Page Tip -->
  <path d="M87 15 v18 c0 5.52 4.48 10 10 10 h18 z" fill="#1251b5" />
  <text x="73" y="66" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-weight="800" font-size="28" fill="#ffffff" text-anchor="middle" letter-spacing="-0.5">PDF</text>

  <!-- Bottom Swoosh & Checkmark Badge -->
  <!-- The White Swoosh divider -->
  <path d="M30 92 c25 -15, 55 -22, 85 -22" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />
  <!-- Blue Badge below swoosh -->
  <path d="M48 83 c20 -8, 45 -11, 67 -11 v20 c0 11 -9 20 -20 20 h-32 c-8.28 0 -15 -6.72 -15 -15 v-14 z" fill="#0051cb" />
  <!-- White Checkmark in Badge -->
  <path d="M68 96 l8 8 l16 -16" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Typography: PDFDoer -->
  <text x="145" y="78" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-weight="800" font-size="54" fill="#1e70eb" letter-spacing="-1.5">PDF<tspan fill="#0f172a">Doer</tspan></text>
</svg>
